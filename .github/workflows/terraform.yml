name: Terraform Deployment

on:
  workflow_dispatch:

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
  TF_VAR_azure_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
  TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
  TF_VERSION: 1.0.0

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Terraform Init
        run: terraform init -upgrade

      # ----------------------------
      # Import Existing Resources
      # ----------------------------
      - name: Import Existing Resources
        run: |
          set +e
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="rg-terraform-test-2026"
          VNET="vnet-main"
          SUBNET="subnet-main"
          NSG="nsg-main"
          STORAGE="storageacct9876543"
          ACR="acrterraformtest2026"
          APP="webapp-linux-tf2026-1"
          SQL_SERVER="sqlserver-terraform-2026"
          SQL_DB="sqldb-terraform-2026"

          echo "Import Resource Group"
          terraform import module.create_resource_group.azurerm_resource_group.rg_main /subscriptions/$SUB/resourceGroups/$RG

          echo "Import Virtual Network"
          terraform import module.create_resource_group.azurerm_virtual_network.vnet_main /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/$VNET

          echo "Import Subnet"
          terraform import module.create_resource_group.azurerm_subnet.subnet_main /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/$VNET/subnets/$SUBNET

          echo "Import Network Security Group"
          terraform import module.create_resource_group.azurerm_network_security_group.nsg_main /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/$NSG

          echo "Import Subnet-NSG Association"
          terraform import module.create_resource_group.azurerm_subnet_network_security_group_association.subnet_nsg_assoc /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/$VNET/subnets/$SUBNET

          echo "Import Storage Account"
          terraform import module.create_resource_group.azurerm_storage_account.storage /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Storage/storageAccounts/$STORAGE

          echo "Import Azure Container Registry"
          terraform import module.create_resource_group.azurerm_container_registry.acr /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ContainerRegistry/registries/$ACR

          echo "Import App Service"
          terraform import module.create_resource_group.azurerm_linux_web_app.app_service /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Web/sites/$APP

          echo "Import SQL Server"
          terraform import module.create_resource_group.azurerm_mssql_server.sql_server /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Sql/servers/$SQL_SERVER

          echo "Import SQL Database"
          terraform import module.create_resource_group.azurerm_mssql_database.sql_db /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Sql/servers/$SQL_SERVER/databases/$SQL_DB

          echo "✅ Import Completed"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan