name: Build and Deploy UI App to App Service

on:
  push:
    branches:
      - main
    paths:
      - 'ui/**'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  DOCKER_IMAGE_NAME: ui-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: image
        run: |
          IMAGE_TAG=$REGISTRY_LOGIN_SERVER/$DOCKER_IMAGE_NAME:${{ github.sha }}
          IMAGE_TAG_LATEST=$REGISTRY_LOGIN_SERVER/$DOCKER_IMAGE_NAME:latest
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_tag_latest=$IMAGE_TAG_LATEST" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t ${{ steps.image.outputs.image_tag }} -t ${{ steps.image.outputs.image_tag_latest }} -f ui/Dockerfile ui/

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Push Docker Image to ACR
        run: |
          docker push ${{ steps.image.outputs.image_tag }}
          docker push ${{ steps.image.outputs.image_tag_latest }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update App Service with New Image
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.APP_SERVICE_NAME }}
          images: ${{ steps.image.outputs.image_tag }}

      - name: Logout from Azure
        run: az logout

  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ UI App deployment successful!"
          else
            echo "❌ UI App deployment failed!"
          fi
